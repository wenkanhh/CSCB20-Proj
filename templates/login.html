{% extends "base.html" %}

{% block title %}Login - Course Planner{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 520px; margin: 0 auto;">
    <h1>Login</h1>
    <p class="muted">Log in with your username or email to view your dashboard, saved programs, and completed courses.</p>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-row">
            <div>
                <label for="login_value">Username or Email</label>
                <input id="login_value" name="login_value" type="text" required>
            </div>
        </div>

        <div class="form-row">
            <div>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>
        </div>

        <div class="actions">
            <button class="primary" type="submit">Login</button>
            <a class="badge" href="{{ url_for('register') }}">Create account</a>
        </div>
    </form>
</div>
{% endblock %}
