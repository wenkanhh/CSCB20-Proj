{% extends "base.html" %}

{% block title %}Register - Course Planner{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 620px; margin: 0 auto;">
    <h1>Register</h1>
    <p class="muted">Create an account first, then you can save programs and completed courses.</p>

    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-row two">
            <div>
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required>
            </div>

            <div>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>
        </div>

        <div class="form-row two">
            <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>
            </div>

            <div>
                <label for="cgpa">CGPA</label>
                <input id="cgpa" name="cgpa" type="number" step="0.01" min="0" max="4" value="0.0" required>
            </div>
        </div>

        <div class="form-row">
            <div>
                <label for="year_standing">Year Standing</label>
                <select id="year_standing" name="year_standing" required>
                    <option value="">Choose one</option>
                    <option value="1">Year 1</option>
                    <option value="2">Year 2</option>
                    <option value="3">Year 3</option>
                    <option value="4">Year 4</option>
                </select>
            </div>
        </div>

        <div class="actions">
            <button class="success" type="submit">Create Account</button>
            <a class="badge" href="{{ url_for('login') }}">Back to login</a>
        </div>
    </form>
</div>
{% endblock %}
